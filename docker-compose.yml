version: '3.8'

services:
  # ==========================================
  # 🚀 API PRINCIPAL (COREPAY)
  # ==========================================
  api:
    build: .
    container_name: ligue-api
    ports:
      - "8081:8080"
    environment:
      - RUNNING_IN_DOCKER=true
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      - ASAAS_URL=https://api.asaas.com/v3
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
      - MAIL_FROM=${MAIL_FROM}
      - DD_AGENT_HOST=datadog-agent
      - DD_DOGSTATSD_PORT=8125
      - DD_TRACE_AGENT_URL=http://datadog-agent:8126
      - DD_SERVICE=ligue-payments
      - DD_ENV=${DD_ENV:-local}
    depends_on:
      - rabbitmq
      - datadog-agent
    networks:
      - ligue-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================
  # 🐘 BANCO DE DADOS (POSTGRES LOCAL)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: ligue_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ligue_payments
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ligue-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d ligue_payments"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 🐇 MENSAGERIA (RABBITMQ COM MÉTRICAS)
  # ==========================================
  rabbitmq:
    build:
      context: .
      dockerfile: Dockerfile.rabbitmq
    container_name: ligue-rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    networks:
      - ligue-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 🐶 MONITORAMENTO (DATADOG AGENT)
  # ==========================================
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: datadog-agent
    entrypoint: ["/bin/bash", "/datadog-entrypoint.sh"]
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=us5.datadoghq.com
      - DD_HOSTNAME=macbook-carlos-local
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_SYSTEM_PROBE_ENABLED=false
      - DD_NETWORK_PATH_TRACEROUTE_ENABLED=false
      - DD_NETWORK_DEVICE_MONITORING_ENABLED=false
      - DD_PROCESS_AGENT_ENABLED=false
      - DD_PROCESS_DISCOVERY_ENABLED=false
      - DD_CWS_ENABLED=false
      - DD_CSPM_ENABLED=false
      - DD_COMPLIANCE_CONFIG_ENABLED=false
      - DD_EC2_METADATA_ENABLED=false
      - DD_GCE_METADATA_ENABLED=false
      - DD_CLOUD_PROVIDER_METADATA_ENABLED=false
      - DD_CLOUD_METADATA_AUTH_ENABLED=false
      - DD_AZURE_METADATA_ENABLED=false
      - DD_REMOTE_CONFIGURATION_ENABLED=false
      - DD_WORKLOADMETA_ENABLED=false
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
    ports:
      - "8126:8126/tcp"
      - "8125:8125/udp"
    volumes:
      - ./datadog-entrypoint.sh:/datadog-entrypoint.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - ligue-network

# ==========================================
# 🌐 REDES E VOLUMES GLOBAIS
# ==========================================
networks:
  ligue-network:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data: