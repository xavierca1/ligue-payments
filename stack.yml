version: '3.8'

# Stack principal para Docker Swarm (Portainer)
# Build direto na KVM:
#   docker build -t ligue-payments:latest .
#   docker build -f Dockerfile.rabbitmq -t ligue-rabbitmq:latest .
# Deploy:
#   docker stack deploy -c stack.yml ligue --resolve-image never
#
# Variáveis: configurar no Portainer (Stacks > Env vars) ou .env no servidor

services:
  api:
    image: ligue-payments:latest
    environment:
      - RUNNING_IN_DOCKER=true
      - PORT=8080
      # Banco
      - DATABASE_URL=${DATABASE_URL}
      # RabbitMQ
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      # Asaas
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      - ASAAS_URL=https://api.asaas.com/v3
      - ASAAS_WEBHOOK_SECRET=${ASAAS_WEBHOOK_SECRET}
      - ASAAS_WEBHOOK_SKIP_SIGNATURE=${ASAAS_WEBHOOK_SKIP_SIGNATURE:-false}
      - ASAAS_WEBHOOK_DEBUG=${ASAAS_WEBHOOK_DEBUG:-false}
      # Kommo CRM
      - KOMMO_ACCOUNT_ID=${KOMMO_ACCOUNT_ID}
      - KOMMO_API_TOKEN=${KOMMO_API_TOKEN}
      - KOMMO_PIPELINE_B2C_ID=${KOMMO_PIPELINE_B2C_ID}
      - KOMMO_FIELD_PRODUTO_ID=${KOMMO_FIELD_PRODUTO_ID}
      - KOMMO_FIELD_ORIGEM_ID=${KOMMO_FIELD_ORIGEM_ID}
      # Doc24 (Telemedicina)
      - DOC24_CLIENT_ID=${DOC24_CLIENT_ID}
      - DOC24_CLIENT_SECRET=${DOC24_CLIENT_SECRET}
      # Email (Azure Graph)
      - USE_GRAPH_EMAIL=${USE_GRAPH_EMAIL:-true}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      - MAIL_FROM=${MAIL_FROM}
      # DocuSeal (Contratos)
      - DOCUSEAL_API_URL=${DOCUSEAL_API_URL:-https://api.docuseal.com}
      - DOCUSEAL_API_KEY=${DOCUSEAL_API_KEY}
      # Supabase (Storage)
      - SUPABASE_CONTRACTS_PROJECT_URL=${SUPABASE_CONTRACTS_PROJECT_URL}
      - SUPABASE_CONTRACTS_BUCKET=${SUPABASE_CONTRACTS_BUCKET:-contracts}
      - SUPABASE_CONTRACTS_SERVICE_ROLE_KEY=${SUPABASE_CONTRACTS_SERVICE_ROLE_KEY}
      - SUPABASE_STORAGE_URL=${SUPABASE_STORAGE_URL}
      # Datadog
      - DD_AGENT_HOST=datadog-agent
      - DD_DOGSTATSD_PORT=8125
      - DD_TRACE_AGENT_URL=http://datadog-agent:8126
      - DD_SERVICE=ligue-payments
      - DD_ENV=${DD_ENV:-production}
    networks:
      - traefik-public
      - ligue-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      labels:
        - traefik.enable=true
        # Rota HTTPS principal
        - traefik.http.routers.ligue-api.rule=Host(`api-ligue-payments.cuidai.xyz`)
        - traefik.http.routers.ligue-api.entrypoints=websecure
        - traefik.http.routers.ligue-api.tls=true
        - traefik.http.routers.ligue-api.tls.certresolver=letsencryptresolver
        - traefik.http.services.ligue-api.loadbalancer.server.port=8080

  rabbitmq:
    image: ligue-rabbitmq:latest
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ligue-internal
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=us5.datadoghq.com
      - DD_HOSTNAME=${DD_HOSTNAME:-ligue-swarm}
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_SYSTEM_PROBE_ENABLED=false
      - DD_PROCESS_AGENT_ENABLED=false
      - DD_CWS_ENABLED=false
      - DD_CSPM_ENABLED=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    networks:
      - ligue-internal
    deploy:
      mode: global
      restart_policy:
        condition: on-failure

networks:
  traefik-public:
    external: true
  ligue-internal:
    driver: overlay

volumes:
  rabbitmq_data:
